version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Europe/Oslo"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25"
          - "26"
    cooldown:
      default-days: 4
    open-pull-requests-limit: 20
    groups:
      react:
        patterns:
          - "react"
          - "@types/react"
          - "react-cookie"
          - "react-dom"
          - "@types/react-dom"
          - "react-router"
      navikt:
        patterns:
          - "@navikt/aksel-icons"
          - "@navikt/ds-css"
          - "@navikt/ds-react"
          - "@navikt/fnrvalidator"
          - "@navikt/nav-dekoratoren-moduler"
          - "@navikt/oasis"
      familie:
        patterns:
          - "@navikt/familie-form-elements"
          - "@navikt/familie-http"
          - "@navikt/familie-logging"
          - "@navikt/familie-skjema"
          - "@navikt/familie-typer"
      tools:
        patterns:
          - "@grafana/faro-web-sdk"
          - "@sentry/react"
          - "@sentry/vite-plugin"
          - "@axe-core/react"
          - "concurrently"
          - "husky"
          - "lint-staged"
          - "@portabletext/react"
          - "@portabletext/toolkit"
          - "@portabletext/types"
          - "@sanity/client"
          - "ramda"
      server:
        patterns:
          - "compression"
          - "cookie-parser"
          - "@types/cookie-parser"
          - "cors"
          - "@types/cors"
          - "express"
          - "@types/express"
          - "http-proxy-middleware"
          - "@types/http-proxy"
          - "mustache-express"
          - "@types/mustache-express"
          - "xss"
      utils:
        patterns:
          - "uuid"
          - "dotenv"
          - "unleash-client"
          - "axios"
          - "date-fns"
          - "i18n-iso-countries"
      build-test-validate:
        patterns:
          - "@types/node"
          - "ts-essentials"
          - "typescript"
          - "@eslint/js"
          - "@types/eslint-plugin-jsx-a11y"
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-import"
          - "eslint-plugin-jsx-a11y"
          - "eslint-plugin-prettier"
          - "eslint-plugin-react-hooks"
          - "globals"
          - "prettier"
          - "typescript-eslint"
          - "@testing-library/dom"
          - "@testing-library/jest-dom"
          - "@testing-library/react"
          - "jsdom"
          - "msw"
          - "vite"
          - "vitest"
          - "vitest-mock-extended"
          - "@vitejs/plugin-react"
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        update-types:
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 4
